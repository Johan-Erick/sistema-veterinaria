<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Iniciar Sesión')}">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
            <img th:src="@{/img/logo.png}" alt="VET EXPERTS Logo">
        </div>

        <h1 class="login-title">Bienvenido de vuelta</h1>
        <p class="login-subtitle">Ingresa tus credenciales para acceder al sistema</p>

        <!-- Mensaje de éxito (logout) -->
        <div th:if="${mensajeExito}" class="alert alert-custom-success mb-3" role="alert">
            <i class="bi bi-check-circle me-2"></i>
            <span th:text="${mensajeExito}">Éxito</span>
        </div>

        <!-- Formulario de Login -->
        <form th:action="@{/auth/login}" method="post" id="loginForm">

            <!-- Username -->
            <div class="mb-custom">
                <label for="username" class="form-label-custom">
                    <i class="bi bi-person me-1"></i> Usuario
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                    <input type="text" 
                           id="username" 
                           name="username" 
                           class="form-control form-control-custom"
                           th:classappend="${errorUsername} ? 'is-invalid'"
                           th:value="${username}"
                           placeholder="Ingresa tu usuario"
                           autocomplete="username">
                </div>
                <div th:if="${errorUsername}" class="invalid-feedback" style="display: block;">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    <span th:text="${errorUsername}">Error</span>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-custom">
                <label for="password" class="form-label-custom">
                    <i class="bi bi-lock me-1"></i> Contraseña
                </label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           class="form-control form-control-custom"
                           th:classappend="${errorPassword} ? 'is-invalid'"
                           placeholder="Ingresa tu contraseña"
                           autocomplete="current-password">
                </div>
                <div th:if="${errorPassword}" class="invalid-feedback" style="display: block;">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    <span th:text="${errorPassword}">Error</span>
                </div>
            </div>

            <!-- Botón de Login -->
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary-custom btn-lg" id="btnLogin">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
                </button>
            </div>

        </form>

        <div class="divider"></div>

        <!-- Info de credenciales por defecto -->
        <div class="text-center">
            <small class="text-muted-custom">
                <i class="bi bi-info-circle me-1"></i>
                Credenciales de prueba: <strong>admin</strong> / <strong>admin123</strong>
            </small>
        </div>

    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

</body>
</html>
